plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

// ── Release Signing ─────────────────────────────────────────────────────────
// key.properties file se signing config load karta hai.
// File gitignore mein hai (safe). GitHub Actions mein Secrets se inject hoti hai.
// Setup: docs/OTA_RELEASE_GUIDE.md dekho.
def keyPropertiesFile = rootProject.file('key.properties')
def keyProperties = new Properties()
if (keyPropertiesFile.exists()) {
    keyProperties.load(new FileInputStream(keyPropertiesFile))
}
// ────────────────────────────────────────────────────────────────────────────

android {
    namespace "com.beatflow.app"
    compileSdk 35

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
        main.java.srcDirs += 'src/main/java'
    }

    defaultConfig {
        applicationId "com.beatflow.app"
        minSdkVersion 23
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    // ── Signing Configs ──────────────────────────────────────────────────────
    signingConfigs {
        release {
            if (keyPropertiesFile.exists()) {
                keyAlias     keyProperties['keyAlias']
                keyPassword  keyProperties['keyPassword']
                storeFile    file(keyProperties['storeFile'])
                storePassword keyProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            // key.properties mili → proper signed APK, nahi mili → debug key fallback
            signingConfig keyPropertiesFile.exists()
                ? signingConfigs.release
                : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
            shrinkResources false
            debuggable true
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.25"
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'androidx.media:media:1.7.0'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
}
